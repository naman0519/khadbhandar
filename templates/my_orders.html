<!DOCTYPE html>
<html>
<head>
  <title>My Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
      font-family: 'Segoe UI', sans-serif;
    }

    .order-card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      margin-top: 50px;
    }

    .table {
      border-radius: 10px;
      overflow: hidden;
    }

    .table th {
      background: #2e7d32;
      color: white;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .back-btn {
      background: #2e7d32;
      color: white;
      border-radius: 10px;
      padding: 10px 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #1b5e20;
      transform: scale(1.05);
    }

    .search-box input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="order-card">

    <h2 class="text-center mb-4">📦 My Orders</h2>

    <!-- 🔍 SEARCH -->
    <form method="GET" action="/my-orders" class="mb-4 text-center search-box">
      <input type="text" name="phone" placeholder="Enter phone number" required>
      <button class="btn btn-success">Check Orders</button>
    </form>

    {{if .orders}}

    <table class="table table-bordered text-center">
      <thead>
        <tr>
          <th>Name</th>
          <th>Product</th>
          <th>Quantity</th>
          <th>Phone</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        {{range .orders}}
        <tr>
          <td>{{.Name}}</td>
          <td>{{.Product}}</td>
          <td>{{.Quantity}}</td>
          <td>{{.Phone}}</td>

          <td>
            {{if eq .Status "Approved"}}
              <span class="badge bg-success">Approved</span>
            {{else}}
              <span class="badge bg-warning text-dark">Pending</span>
            {{end}}
          </td>

        </tr>
        {{end}}
      </tbody>
    </table>

    {{else}}
      <p class="text-center text-danger">No orders found</p>
    {{end}}

    <!-- 🔙 BACK BUTTON -->
    <div class="text-center mt-4">
      <a href="/" class="back-btn">⬅ Back to Home</a>
    </div>

  </div>

</div>

</body>
</html>
