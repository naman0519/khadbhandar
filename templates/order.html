<!DOCTYPE html>
<html>
<head>

    <title>Place order</title>

    <link rel="stylesheet" href="/static/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="order-page">

<div class="container mt-5">

<div class="order-container">

<h2 class="text-center">Place Your order</h2>

<form id="orderForm" action="/place-order" method="POST">

    <!-- Form field -->

<div class="mb-3">
<label>Product Name</label>
<input type="text" name="product" value="{{.product}}" class="form-control" readonly>
</div>


<div class="mb-3">
<label>Farmer Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="tel" name="phone" class="form-control"
pattern="[0-9]{10}" maxlength="10"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
placeholder="Enter 10 digit mobile number" required>
</div>


<!--  Quantity Dropdown -->
<div class="mb-3">
<label>Quantity (Bags)</label>
<input type="number" id="quantity" name="quantity" 
class="form-control" min="1" max="30"
placeholder="Enter quantity" required>

<p id="stockMsg" class="mt-2"></p>

<input type="hidden" id="stockValue" value="{{.stock}}">
</div>

<!-- Delivery -->
<div class="mb-3">
<label>Delivery Type</label>
<select name="delivery" class="form-control">
  <option>Pickup from Shop</option>
</select>
</div>

<!--  Payment -->
<div class="mb-3">
<label>Payment Mode</label>
<select name="payment" class="form-control">
  <option>Cash Only (Shop)</option>
</select>
</div>

<div class="d-flex gap-3 mt-3">

  <button type="submit" class="btn btn-primary">
    Place Order
  </button>

  <a href="https://wa.me/919813192918?text=Hello%20Jai%20Shree%20Khad%20Bhandar%2C%20I%20want%20to%20order%20fertilizer"
     target="_blank"
     class="btn btn-success">
     Order on WhatsApp
  </a>

</div>

<script src="/static/js/main.js"></script>

</body>
</html>
