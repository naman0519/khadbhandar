<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: #f5f5f5; /* light white/grey */

    position: relative;
}

/* WATERMARK LOGO */
body::before {
    content: "";
    position: absolute;

    width: 1300px;
    height: 1300px;

    background: url('/static/images/logo.png') no-repeat center;
    background-size: contain;

    opacity: 0.15;  /* 👈 perfect faint watermark */

    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    z-index: 0;

}
/* LOGIN BOX */
.login-box {
    position: relative;
    z-index: 1;

    background:rgba(10, 88, 79, 0.348);
    padding: 40px;
    border-radius: 12px;

    width: 400px;

    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

TITLE
.login-box h2 {
    margin-bottom: 25px;
    font-weight: bold;
}

/* INPUT */
.login-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;

    border-radius: 8px;
    border: 1px solid #ccc;
}

.login-box button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;

    background: #2e7d32;
    color: white;
    border: none;

    font-weight: bold;
}

.login-box {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login-box button:hover {
    background: #1b5e20;
    transform: scale(1.03);
}


</style>

</head>

<body>

<div class="login-box">

<img src="/static/images/logo.png" width="60" style="margin-bottom:10px;">

<h2>🔐 Admin Login JSKB</h2>

<p style="font-size:13px; opacity:0.7; margin-bottom:20px;">
  Manage Orders • Stock • Products
</p>

<form method="POST" action="/admin/login">

<div style="position:relative; margin-bottom:15px;">
  <span style="position:absolute; left:10px; top:12px;">👤</span>
  <input type="text" name="username" placeholder="Username" style="padding-left:35px;">
</div>

<div style="position:relative; margin-bottom:15px;">
  <span style="position:absolute; left:10px; top:12px;">🔒</span>
  <input type="password" name="password" placeholder="Password" style="padding-left:35px;">
</div>

<div style="text-align:right; margin-bottom:10px;">
  <input type="checkbox" onclick="togglePassword()"> Show Password
</div>

<button type="submit" onclick="showLoading(this)">Login</button>

{{if .error}}
<div style="background:#ffebee; color:#c62828; padding:10px; border-radius:6px; margin-top:10px;">
  {{.error}}
</div>
{{end}}

<p style="margin-top:15px; font-size:12px; opacity:0.6;">
  © 2026 Jai Shree Khad Bhandar
</p>

{{if .error}}
<p style="color:red; margin-top:10px;">{{.error}}</p>
{{end}}

</form>

</div>



</body>
<script src="/static/js/main.js"></script>
</html>
