<!DOCTYPE html>
<html>
<head>
<title>Admin Products</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2>Manage Stock</h2>

<table class="table table-bordered mt-4">

<tr>
<th>Product</th>
<th>Stock</th>
<th>Update</th>
</tr>

{{range .products}}
<tr>

<td>{{.Name}}</td>

<td>{{.Stock}}</td>

<td>
<form action="/update-stock" method="POST" style="display:flex; gap:10px">

<input type="hidden" name="product" value="{{.Name}}">
<input type="hidden" name="key" value="1234">

<input type="number" name="stock" placeholder="New stock" required>

<button class="btn btn-success btn-sm">Update</button>

</form>
</td>

</tr>
{{end}}

</table>

</div>

</body>
</html>
